
server:
  mode: production  # development/production
  port: 8080
  host: 0.0.0.0

# 认证配置
auth:
  strategies:
    - type: api_key
      enabled: true
      config: {}
    - type: anonymous
      enabled: false
      config:
        requests_per_minute: 10

# ASR 后端配置（新增，兼容 OpenAI Whisper API）
asr:
  providers:
    - name: default
      type: whisper # whisper / sensevoice / custom
      url: http://localhost:8000/v1
      model: whisper-1
      api_key: "sk-asr-xxx"
      parameters:
        response_format: json # 注意: verbose_json 可能不被所有 ASR 模型支持 (如 glm-asr)
        temperature: 0.0
        language: "" # 留空自动检测

# 纠错配置（新增）
correction:
  enabled: true
  merge_with_translation: true
  global_dictionary: []

# Pipeline 配置
pipeline:
  tool_calling:
    enabled: true         # 是否启用 Tool Calling（否则用 JSON 块）
    allow_thinking: false # 是否允许 LLM 在 tool call 前输出思考/解释文本

# LLM后端配置
backends:
  load_balancer:
    strategy: round_robin
  providers:
    - name: default
      type: vllm
      url: http://localhost:8000/v1
      model: qwen
      api_key: "sk-xxx"
      # LLM模型参数配置（可选）
      parameters:
        temperature: 0.2          # 控制输出的随机性，范围 0.0-2.0
        max_tokens: 120           # 最大输出token数
        top_p: 0.95              # 核采样参数，范围 0.0-1.0
        stream: false            # 是否使用流式输出

# 提示词配置
prompt:
  defaults:
    task: translate
    target_languages: ["en", "ja", "zh"]
  languages:
    # 标准语言
    - code: zh
      names:
        display: "中文"
        english: "Chinese"
        native: "中文"
      aliases: ["chinese", "中文", "汉语", "zh-cn"]
    - code: zh-hant
      names:
        display: "繁體中文"
        english: "Traditional Chinese"
        native: "繁體中文"
      aliases: ["zh-tw", "zh-hk", "traditional chinese", "繁体中文", "繁體中文"]
    - code: en
      names:
        display: "英文"
        english: "English"
        native: "English"
      aliases: ["english", "英文", "英语"]
    - code: ja
      names:
        display: "日文"
        english: "Japanese"
        native: "日本語"
      aliases: ["japanese", "日文", "日语", "日本語"]
    - code: ko
      names:
        display: "韩文"
        english: "Korean"
        native: "한국어"
      aliases: ["korean", "韩文", "韩语", "한국어"]
    - code: es
      names:
        display: "西班牙语"
        english: "Spanish"
        native: "Español"
      aliases: ["spanish", "西班牙语", "español"]
    - code: fr
      names:
        display: "法语"
        english: "French"
        native: "Français"
      aliases: ["french", "法语", "français"]
    - code: de
      names:
        display: "德语"
        english: "German"
        native: "Deutsch"
      aliases: ["german", "德语", "deutsch"]
    - code: ru
      names:
        display: "俄语"
        english: "Russian"
        native: "Русский"
      aliases: ["russian", "俄语", "俄文", "俄罗斯语"]
    - code: it
      names:
        display: "意大利语"
        english: "Italian"
        native: "Italiano"
      aliases: ["italian", "意大利语", "意大利文"]
    - code: pt
      names:
        display: "葡萄牙语"
        english: "Portuguese"
        native: "Português"
      aliases: ["portuguese", "葡萄牙语", "葡萄牙文", "português"]
    - code: ar
      names:
        display: "阿拉伯语"
        english: "Arabic"
        native: "العربية"
      aliases: ["arabic", "阿拉伯语", "阿拉伯文", "العربية"]
    - code: hi
      names:
        display: "印地语"
        english: "Hindi"
        native: "हिन्दी"
      aliases: ["hindi", "印地语", "印地文", "हिन्दी"]
    - code: th
      names:
        display: "泰语"
        english: "Thai"
        native: "ไทย"
      aliases: ["thai", "泰语", "泰文", "ไทย"]
    - code: vi
      names:
        display: "越南语"
        english: "Vietnamese"
        native: "Tiếng Việt"
      aliases: ["vietnamese", "越南语", "越南文", "tiếng việt"]
    - code: id
      names:
        display: "印尼语"
        english: "Indonesian"
        native: "Bahasa Indonesia"
      aliases: ["indonesian", "印尼语", "印尼文", "bahasa indonesia"]
    - code: ms
      names:
        display: "马来语"
        english: "Malay"
        native: "Bahasa Melayu"
      aliases: ["malay", "马来语", "马来文", "bahasa melayu"]

    # 趣味语言
    - code: neko
      type: fun
      names:
        display: "猫娘语"
        english: "Neko-speak"
        native: "猫娘语喵~"
      aliases: ["neko", "猫娘", "喵喵语", "萌妹语", "nya"]
      style_note: '语气可爱活泼，句尾适当添加"喵~"，可使用颜文字(◕ᴗ◕✿)，保持原意不变。'
  parsing:
    separators: [":", "：", "-", "—"]
    strict_mode: false
    validation:
      required_sections: []
      min_content_length: 1
      max_content_length: 3000

# 日志配置
logging:
  level: debug
  format: json 
